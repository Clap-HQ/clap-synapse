name: Deploy to AWS EKS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - staging
          - production

  push:
    branches:
      - clap/main
    paths:
      - 'k8s/**'

env:
  AWS_REGION: ap-northeast-2

permissions:
  id-token: write  # For OIDC
  contents: read

jobs:
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest

    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set environment variables
        id: env-vars
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"

          case "$ENV" in
            dev)
              echo "cluster=clap-eks-dev" >> $GITHUB_OUTPUT
              echo "namespace=dev" >> $GITHUB_OUTPUT
              ;;
            staging)
              echo "cluster=clap-eks-staging" >> $GITHUB_OUTPUT
              echo "namespace=staging" >> $GITHUB_OUTPUT
              ;;
            production)
              echo "cluster=clap-eks-production" >> $GITHUB_OUTPUT
              echo "namespace=production" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.31.0'

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ steps.env-vars.outputs.cluster }}

          # Verify connection
          kubectl get nodes
          echo "✅ kubectl configured successfully"

      - name: Set Secret ARNs from Terraform
        id: set-arns
        run: |
          # Get Secret ARNs from AWS SSM Parameter Store or environment
          # These should be stored as GitHub Secrets or fetched from Terraform state
          ENV="${{ github.event.inputs.environment || 'dev' }}"

          case "$ENV" in
            dev)
              echo "DB_SECRET_ARN=${{ secrets.DEV_DB_SECRET_ARN }}" >> $GITHUB_ENV
              echo "SYNAPSE_SECRET_ARN=${{ secrets.DEV_SYNAPSE_SECRET_ARN }}" >> $GITHUB_ENV
              ;;
            staging)
              echo "DB_SECRET_ARN=${{ secrets.STAGING_DB_SECRET_ARN }}" >> $GITHUB_ENV
              echo "SYNAPSE_SECRET_ARN=${{ secrets.STAGING_SYNAPSE_SECRET_ARN }}" >> $GITHUB_ENV
              ;;
            production)
              echo "DB_SECRET_ARN=${{ secrets.PROD_DB_SECRET_ARN }}" >> $GITHUB_ENV
              echo "SYNAPSE_SECRET_ARN=${{ secrets.PROD_SYNAPSE_SECRET_ARN }}" >> $GITHUB_ENV
              ;;
          esac

          echo "✅ Secret ARNs configured"

      - name: Create Kubernetes Secrets
        run: |
          cd k8s
          chmod +x create-secrets.sh
          ./create-secrets.sh ${{ steps.env-vars.outputs.namespace }}

          echo "✅ Secrets created successfully"

      - name: Deploy Kubernetes manifests
        run: |
          cd k8s
          NAMESPACE="${{ steps.env-vars.outputs.namespace }}"

          echo "📦 Deploying manifests to $NAMESPACE namespace..."

          # Deploy namespace (cluster-scoped, no -n flag)
          kubectl apply -f namespace.yaml
          echo "✅ Namespace applied"

          # Deploy namespaced resources with explicit -n flag
          kubectl apply -f serviceaccount.yaml -n $NAMESPACE
          echo "✅ ServiceAccount applied"

          kubectl apply -f persistentvolume.yaml
          echo "✅ PersistentVolume applied (cluster-scoped)"

          kubectl apply -f configmap.yaml -n $NAMESPACE
          echo "✅ ConfigMap applied"

          kubectl apply -f deployment.yaml -n $NAMESPACE
          echo "✅ Deployment applied"

          kubectl apply -f service.yaml -n $NAMESPACE
          echo "✅ Service applied"

          kubectl apply -f ingress.yaml -n $NAMESPACE
          echo "✅ Ingress applied"

      - name: Wait for Pod to be Ready
        run: |
          echo "⏳ Waiting for Pod to be Ready..."
          kubectl wait --for=condition=Ready pod \
            -l app=synapse \
            -n ${{ steps.env-vars.outputs.namespace }} \
            --timeout=300s

          echo "✅ Pod is Ready"

      - name: Verify Deployment
        run: |
          NAMESPACE="${{ steps.env-vars.outputs.namespace }}"

          echo "### 📊 Deployment Status - ${{ steps.env-vars.outputs.cluster }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check Pods
          echo "#### Pods" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n $NAMESPACE -l app=synapse >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check Service
          echo "#### Service" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get service synapse -n $NAMESPACE >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check Ingress
          echo "#### Ingress" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get ingress synapse -n $NAMESPACE >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Get Pod logs (last 50 lines)
          echo "#### Recent Logs" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl logs -n $NAMESPACE -l app=synapse --tail=50 >> $GITHUB_STEP_SUMMARY || echo "Failed to fetch logs" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Test Health Endpoint
        run: |
          NAMESPACE="${{ steps.env-vars.outputs.namespace }}"

          echo "🔍 Testing Matrix API health endpoint..."

          # Poll for Ingress hostname with timeout
          MAX_WAIT=300  # 5 minutes
          INTERVAL=10   # 10 seconds
          ELAPSED=0
          ALB_DNS=""

          echo "⏳ Waiting for Ingress to get ALB hostname..."
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            ALB_DNS=$(kubectl get ingress synapse -n $NAMESPACE -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")

            if [ -n "$ALB_DNS" ]; then
              echo "✅ ALB DNS available: $ALB_DNS"
              break
            fi

            echo "⏳ Waiting for ALB provisioning... (${ELAPSED}s/${MAX_WAIT}s)"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ -z "$ALB_DNS" ]; then
            echo "⚠️ ALB DNS not available after ${MAX_WAIT}s. Checking Pod health directly..."

            POD_NAME=$(kubectl get pod -n $NAMESPACE -l app=synapse -o jsonpath='{.items[0].metadata.name}')
            if [ -n "$POD_NAME" ]; then
              echo "Testing Pod directly: $POD_NAME"
              kubectl exec -n $NAMESPACE $POD_NAME -- curl -s http://localhost:8008/_matrix/client/versions
              echo "✅ Pod health check passed (ALB may still be provisioning)"
            else
              echo "❌ No Pod found"
              exit 1
            fi
          else
            # Poll for healthy ALB targets
            echo "⏳ Waiting for ALB target health..."
            ELAPSED=0
            HEALTHY=false

            while [ $ELAPSED -lt $MAX_WAIT ]; do
              # Try to get target group ARN from Ingress annotations
              TG_ARN=$(kubectl get ingress synapse -n $NAMESPACE -o jsonpath='{.metadata.annotations.alb\.ingress\.kubernetes\.io/target-group-arns}' 2>/dev/null | cut -d',' -f1 || echo "")

              if [ -n "$TG_ARN" ]; then
                HEALTHY_COUNT=$(aws elbv2 describe-target-health \
                  --target-group-arn "$TG_ARN" \
                  --query "length(TargetHealthDescriptions[?TargetHealth.State=='healthy'])" \
                  --output text 2>/dev/null || echo "0")

                if [ "$HEALTHY_COUNT" -gt 0 ]; then
                  echo "✅ ALB has $HEALTHY_COUNT healthy target(s)"
                  HEALTHY=true
                  break
                fi
              fi

              echo "⏳ Waiting for healthy targets... (${ELAPSED}s/${MAX_WAIT}s)"
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
            done

            # Test HTTP endpoint
            if [ "$HEALTHY" = true ]; then
              echo "🔍 Testing HTTP endpoint..."
              RESPONSE=$(curl -L -s -w "\n%{http_code}" http://$ALB_DNS/_matrix/client/versions)
              HTTP_CODE=$(echo "$RESPONSE" | tail -1)

              if [ "$HTTP_CODE" = "200" ]; then
                echo "✅ Health endpoint responding (HTTP $HTTP_CODE)"
                echo "$RESPONSE" | head -n -1
              else
                echo "⚠️ Health endpoint returned HTTP $HTTP_CODE"
              fi
            else
              echo "⚠️ ALB targets not healthy after ${MAX_WAIT}s, but Pod is healthy"
              echo "This is normal - ALB may take several minutes to provision fully"

              # Fallback to Pod health check
              POD_NAME=$(kubectl get pod -n $NAMESPACE -l app=synapse -o jsonpath='{.items[0].metadata.name}')
              kubectl exec -n $NAMESPACE $POD_NAME -- curl -s http://localhost:8008/_matrix/client/versions
            fi
          fi

          echo "✅ Deployment verification complete"

      - name: Create deployment record
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "### 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: $ENV" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster**: ${{ steps.env-vars.outputs.cluster }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Namespace**: ${{ steps.env-vars.outputs.namespace }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $TIMESTAMP" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
