apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: synapse
  namespace: dev
  annotations:
    # ALB Ingress Controller
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/group.name: clap-eks-dev
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'

    # Certificate
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-northeast-2:619888520513:certificate/a4c13ef6-d1eb-46e6-994e-beb727d205ea

    # Health Check
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: /_matrix/client/versions
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '30'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '2'

    # Target Group
    alb.ingress.kubernetes.io/target-group-attributes: deregistration_delay.timeout_seconds=30

    # Tags (shared with other services in the same ALB group)
    alb.ingress.kubernetes.io/tags: Environment=dev,Project=clap,ManagedBy=kubernetes

    # Apple App Site Association - ALB Fixed Response
    alb.ingress.kubernetes.io/actions.apple-aasa: |
      {"type":"fixed-response","fixedResponseConfig":{"contentType":"application/json","statusCode":"200","messageBody":"{\"applinks\":{\"apps\":[],\"details\":[{\"appIDs\":[\"DFDZD34G7P.ac.clap.app.dev\"],\"components\":[{\"/\":\"/oidc/*\"}]}]},\"webcredentials\":{\"apps\":[\"DFDZD34G7P.ac.clap.app.dev\"]}}"}}

    # Android Asset Links - ALB Fixed Response
    alb.ingress.kubernetes.io/actions.android-assetlinks: |
      {"type":"fixed-response","fixedResponseConfig":{"contentType":"application/json","statusCode":"200","messageBody":"[{\"relation\":[\"delegate_permission/common.handle_all_urls\"],\"target\":{\"namespace\":\"android_app\",\"package_name\":\"ac.clap.app.dev\",\"sha256_cert_fingerprints\":[\"31:60:E1:34:70:1E:08:2C:B4:75:FD:4C:4A:AC:72:88:7B:13:70:AF:8C:F8:A3:D5:BB:1E:61:E7:79:A5:43:B3\",\"FB:32:B6:8F:12:A2:C2:D6:38:97:BC:71:B1:6B:7E:EA:68:54:D7:3F:3C:73:2E:F7:81:D4:89:71:2F:95:9B:16\"]}}]"}}
spec:
  rules:
  - host: dev.clap.ac
    http:
      paths:
      - path: /.well-known/apple-app-site-association
        pathType: Exact
        backend:
          service:
            name: apple-aasa
            port:
              name: use-annotation
      - path: /.well-known/assetlinks.json
        pathType: Exact
        backend:
          service:
            name: android-assetlinks
            port:
              name: use-annotation
      - path: /_matrix/client/v3/login
        pathType: Prefix
        backend:
          service:
            name: mas-service
            port:
              number: 8080
      - path: /_matrix/client/v3/logout
        pathType: Prefix
        backend:
          service:
            name: mas-service
            port:
              number: 8080
      - path: /_matrix/client/v3/refresh
        pathType: Prefix
        backend:
          service:
            name: mas-service
            port:
              number: 8080
      # Synapse handles everything else
      - path: /
        pathType: Prefix
        backend:
          service:
            name: synapse
            port:
              number: 8008
  - host: matrix.dev.clap.ac
    http:
      paths:
      - path: /_matrix/client/v3/login
        pathType: Prefix
        backend:
          service:
            name: mas-service
            port:
              number: 8080
      - path: /_matrix/client/v3/logout
        pathType: Prefix
        backend:
          service:
            name: mas-service
            port:
              number: 8080
      - path: /_matrix/client/v3/refresh
        pathType: Prefix
        backend:
          service:
            name: mas-service
            port:
              number: 8080
      # Synapse handles everything else
      - path: /
        pathType: Prefix
        backend:
          service:
            name: synapse
            port:
              number: 8008
