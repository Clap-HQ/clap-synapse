apiVersion: v1
kind: ConfigMap
metadata:
  name: synapse-config
  namespace: dev
data:
  SYNAPSE_SERVER_NAME: "dev.clap.ac"
  SYNAPSE_PUBLIC_BASEURL: "https://dev.clap.ac"
  SYNAPSE_REPORT_STATS: "no"
  POSTGRES_HOST: "clap-synapse-db-dev.cfiyo0k0ywot.ap-northeast-2.rds.amazonaws.com"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "synapse"
  POSTGRES_USER: "synapse"
  AWS_REGION: "ap-northeast-2"
  # S3 Storage Provider configuration
  # Note: Variable name must match homeserver.yaml template (S3_BUCKET_NAME)
  S3_BUCKET_NAME: "clap-messenger-media-dev-619888520513"
  # Auto DM Bot Module
  AUTO_DM_BOT_USER_ID: "@clap-ai:dev.clap.ac"
  # Application Services (bridges)
  # Note: start.py auto-discovers registration files from /conf/appservices/*.yaml
  # Mount appservice secrets to /conf/appservices directory
