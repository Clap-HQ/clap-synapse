---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: synapse-efs-pv
spec:
  capacity:
    storage: 100Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: efs-sc
  csi:
    driver: efs.csi.aws.com
    volumeHandle: fs-0edb29142c0955b1a::fsap-00fbf597dc0b39bc4

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: synapse-efs-pvc
  namespace: dev
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: efs-sc
  resources:
    requests:
      storage: 100Gi
